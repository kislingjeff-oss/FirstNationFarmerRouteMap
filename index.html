<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>First Nation&ndash;Farmer Climate Unity March &mdash; Route Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root{
    --cream:#FBFAF6; --paper:#FFFFFF; --ink:#2A352F; --muted:#5A655E;
    --sage:#4E7261; --blue:#517087; --blush:#B67A70; --gold:#9F7C36; --lav:#7E76A6;
    --sage-bg:#E5EDE8; --blue-bg:#E4EDF2; --blush-bg:#F5E4DF; --gold-bg:#F4ECD9; --lav-bg:#E9E4F0;
    --line:#E2E8E3;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{background:var(--cream);color:var(--ink);font-family:'Inter',sans-serif;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
  h1,h2,h3,.kicker,.badge,.chip{font-family:'Poppins',sans-serif;}

  header{padding:16px 26px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#F1F5F0,var(--cream));flex:0 0 auto;}
  .kicker{letter-spacing:.2em;text-transform:uppercase;font-size:.7rem;font-weight:600;color:var(--blue);}
  header h1{font-family:'Poppins';font-weight:700;font-size:1.5rem;margin:2px 0 3px;line-height:1.1;}
  header .meta{color:var(--sage);font-size:.9rem;font-family:'Poppins';font-weight:500;}
  header .meta b{color:var(--ink);}

  .app{flex:1 1 auto;display:flex;min-height:0;}
  #map{flex:1 1 auto;min-height:0;background:#eef2ee;}
  .panel{flex:0 0 400px;max-width:42%;background:var(--paper);border-left:1px solid var(--line);overflow-y:auto;padding:24px 26px;}
  @media(max-width:820px){
    .app{flex-direction:column;} #map{flex:0 0 52vh;} .panel{flex:1 1 auto;max-width:100%;border-left:none;border-top:1px solid var(--line);}
  }

  /* markers */
  .mk{display:flex;align-items:center;justify-content:center;border-radius:50%;color:#fff;font-family:'Poppins';font-weight:700;box-shadow:0 2px 6px rgba(42,53,47,.35);border:2.5px solid #fff;transition:transform .15s;}
  .mk:hover{transform:scale(1.15);}
  .mk.sel{transform:scale(1.25);box-shadow:0 0 0 4px rgba(78,114,97,.3),0 2px 8px rgba(42,53,47,.4);}

  /* panel: overview */
  .p-kicker{letter-spacing:.16em;text-transform:uppercase;font-size:.72rem;font-weight:600;color:var(--blue);font-family:'Poppins';}
  .p-title{font-family:'Poppins';font-weight:600;font-size:1.25rem;margin:6px 0 4px;}
  .p-intro{color:var(--muted);font-size:.96rem;margin:0 0 20px;}
  .stoplist{display:flex;flex-direction:column;gap:8px;}
  .chip{display:flex;align-items:center;gap:12px;border:1px solid var(--line);background:var(--cream);border-radius:12px;padding:10px 12px;cursor:pointer;transition:.15s;text-align:left;}
  .chip:hover{border-color:var(--sage);background:#fff;transform:translateX(3px);}
  .chip .cdot{flex:0 0 auto;width:30px;height:30px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Poppins';font-weight:700;font-size:.85rem;}
  .chip .ctxt{flex:1;min-width:0;}
  .chip .cname{font-family:'Poppins';font-weight:600;font-size:.95rem;line-height:1.2;}
  .chip .csub{font-size:.8rem;color:var(--muted);}

  /* panel: detail */
  .back{border:none;background:none;color:var(--sage);font-family:'Poppins';font-weight:500;font-size:.88rem;cursor:pointer;padding:0;margin-bottom:14px;}
  .back:hover{text-decoration:underline;}
  .badge{display:inline-block;color:#fff;font-size:.74rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;padding:5px 12px;border-radius:20px;}
  .d-title{font-family:'Poppins';font-weight:700;font-size:1.45rem;margin:12px 0 2px;line-height:1.15;}
  .d-facts{display:flex;flex-wrap:wrap;gap:8px 16px;color:var(--muted);font-size:.86rem;margin:8px 0 16px;font-family:'Poppins';font-weight:500;}
  .d-facts span b{color:var(--ink);}
  .d-body{font-size:.98rem;line-height:1.7;color:#33403a;}
  .d-body p{margin:0 0 14px;}
  .d-nav{display:flex;justify-content:space-between;gap:10px;margin-top:24px;padding-top:18px;border-top:1px solid var(--line);}
  .btn{font-family:'Poppins';font-weight:500;font-size:.85rem;border:1px solid var(--line);background:var(--paper);color:var(--muted);border-radius:24px;padding:9px 16px;cursor:pointer;transition:.15s;}
  .btn:hover:not(:disabled){border-color:var(--sage);color:var(--sage);}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .leaflet-popup-content{font-family:'Poppins';font-weight:600;color:var(--ink);margin:10px 14px;}
  .leaflet-container{font-family:'Inter';}
</style>
</head>
<body>
<header>
  <div class="kicker">What Did Not Reach Us</div>
  <h1>The First Nation&ndash;Farmer Climate Unity March</h1>
  <div class="meta"><b>94 miles</b> &middot; <b>8 days</b> &middot; September 1&ndash;8, 2018 &middot; Des Moines &rarr; Fort Dodge, along the route of the Dakota Access Pipeline</div>
</header>
<div class="app">
  <div id="map"></div>
  <div class="panel" id="panel"></div>
</div>

<script>
const C = {gather:'#7E76A6', press:'#517087', start:'#9F7C36', camp:'#4E7261', celebration:'#B67A70'};
const CATLABEL = {gather:'Gathering', press:'Press conference', start:'The walk begins', camp:'Overnight camp', celebration:'Celebration'};

const stops = [
  {label:'✦', cat:'gather', date:'Fri, Aug 31, 2018', miles:'', place:'Union Park, Des Moines', sub:'The gathering', lat:41.6212, lng:-93.5928,
   body:`<p>People slowly gathered last night for the beginning of the First Nation-Farmer Climate Unity March. Tents popped up on the hill near the shelter at Union Park. Dinner was served around 7:00 pm, followed by introductions and discussions of the logistics of the March.</p><p>Manape told us they were providing security and safety so that we could accomplish our sacred journey.</p><p>As expected, rain and thunder arrived. I was awoken at 3 am, and that continued for most of the rest of the night.</p>`},
  {label:'✦', cat:'press', date:'Sat, Sep 1, 2018 &middot; 9 a.m.', miles:'', place:'Iowa Utilities Board', sub:'Press conference', lat:41.5862, lng:-93.6009,
   body:`<p>We then carpooled to the Iowa Utilities Board (IUB) for a press conference to announce the First Nation-Farmer Climate Unity March. One of the primary goals of the March is to call attention to the IUB&rsquo;s improper approval of eminent domain to force Iowa landowners to allow construction of the Dakota Access Pipeline on their property. The lawsuit by the Sierra Club and landowners against the IUB will be heard in the Iowa Supreme Court September 12.</p><p>The Iowa State Patrol kept an eye on us.</p>`},
  {label:'▶', cat:'start', date:'Sat, Sep 1, 2018', miles:'', place:'Birdland Park', sub:'The walk begins', lat:41.6247, lng:-93.6068,
   body:`<p>We gathered in a circle. Ed made some remarks about beginning the March, then Ako Abdul-Samad gave a wonderful blessing. Manape LaMere sang. He has a very powerful voice. That, and the song Regina Tsosie sang earlier at the IUB, and the Native dress began my introduction to the lives of the Native Americans I would be with for the next eight days.</p><p>Finally, the March began, going on the trails along the swollen Des Moines River and then into Des Moines and Ankeny neighborhoods. The sun came out after a couple of hours. With the high humidity from evaporating rain water, the heat index climbed to around 90 degrees.</p>`},
  {label:'1', cat:'camp', date:'Day 1 &middot; Sep 1', miles:'13.2 mi', place:'Griffieon Farm, Ankeny', sub:'First forum', lat:41.7470, lng:-93.5840,
   body:`<p>We (finally) arrived at our first destination, the farm of Craig and LaVon Griffieon on the north side of Ankeny. When we arrived the tipi had been setup.</p><p>After the Griffieon&rsquo;s shared their story, Regina Tsosie spoke. First she embraced and thanked Craig and LaVon for their hospitality. Then she spoke about the parallels of the attempts to take their farm with the theft of Native lands in the United States.</p><p>Severe thunderstorms began during the evening forum and continued through the night. A tornado was sighted about 20 miles away from us.</p>`},
  {label:'2', cat:'camp', date:'Day 2 &middot; Sep 2', miles:'9.0 mi', place:'Fjeldberg Lutheran Church, Huxley', sub:'Sanctuary &amp; the ag forum', lat:41.8996, lng:-93.6012,
   body:`<p>Sam, our sag wagon driver and scout discovered our intended camping spot at Huxley was underwater. Thankfully, when she was able to contact someone associated with the Fjeldberg Lutheran Church in Huxley, they offered us sanctuary which we are very grateful for. We scattered our sleeping bags throughout the rooms in church.</p><p>The forum this evening gets to the heart of First Nation-Farmer unity. Ed Fallon then asks the key question, how can more farmers be convinced to change to the improved agricultural practices Lee and Christine talk about?</p>`},
  {label:'3', cat:'camp', date:'Day 3 &middot; Sep 3', miles:'~10 mi', place:'Ames', sub:'The first pipeline crossing', lat:42.0038, lng:-93.6360,
   body:`<p>Prior to beginning today, Tricia performed smudging for us, to remove negative energy and bring positive energy.</p><p>After Lee Tesdell&rsquo;s presentation last night, he took me to see where the pipeline crossed the highway we would be traveling on when we left Huxley. We planned to have a ceremony when we reached the pipeline. Donnielle Wanatee offered good prayers, asking for protection for the walkers, and for their families at home. I was surprised at what an emotional time this was.</p><p>These deep emotions were felt by all of us every time we crossed the pipeline. I could see from the expressions and body language that every one of us was feeling the trauma of the land and water being desecrated by the black snake.</p>`},
  {label:'4', cat:'camp', date:'Day 4 &middot; Sep 4', miles:'15.1 mi', place:'Boone County Fairgrounds', sub:'&ldquo;We are a tribe&rdquo;', lat:42.0743, lng:-93.8646,
   body:`<p>The group is becoming more cohesive as we share our stories. As Donnielle said, &ldquo;we are a tribe.&rdquo;</p><p>Dinner that included buffalo meat and fry bread followed. Looking around the table I thought it would be nice if this was a &ldquo;real&rdquo; Thanksgiving dinner. Manape said, we call it Thanks-taking.</p><p>This was the first night we all slept in the same space together, which I thought added another dimension to us growing closer as a group.</p>`},
  {label:'5', cat:'camp', date:'Day 5 &middot; Sep 5', miles:'14.0 mi', place:'Pilot Mound', sub:'Jeff leads the prayers', lat:42.1608, lng:-93.9213,
   body:`<p>Before crossing the river just before reaching our destination of Pilot Mound, we came to another pipeline crossing. We could see the area where trees had been removed to build the pipeline on the hill on the other side of the river.</p><p>As always, we stopped for prayers. This time I was asked to lead them. I was very happy to have this opportunity to share some about Quakers and the Spirit. As we stood in a circle holding hands, I mentioned that Peter Clay, Lee Tesdell, and I were Quakers.</p><p>We found there was no cell phone or internet service available in Pilot Mound. In a way that seemed to symbolize that we were cut off from civilization.</p>`},
  {label:'6', cat:'camp', date:'Day 6 &middot; Sep 6', miles:'9.0 mi', place:'Oak Park, Dayton', sub:'A shorter day', lat:42.2660, lng:-94.0690,
   body:`<p>Day 6 of the First Nation-Farmer Climate Unity March began with another awesome breakfast by Lyssa Wade.</p><p>After setting up my tent once we arrived at Oak Park in Dayton, I spent most of the rest of the day at the public golf course&rsquo;s country club, which was adjacent to the park. I had two days of photos and writing to catch up on. Unfortunately I missed the evening presentation.</p>`},
  {label:'7', cat:'camp', date:'Day 7 &middot; Sep 7', miles:'11.7 mi', place:'Otho', sub:'Stories, flute &amp; the bonfire', lat:42.4020, lng:-94.1500,
   body:`<p>Since much of the route today wasn&rsquo;t on busy roads, we were able to walk side by side and share more stories. Ed Fallon played his flute as we marched.</p><p>Also near that creek, Manape showed us wild grapes growing alongside the road, and the fragrance of them when they were crushed.</p><p>After dinner it was dark. We sat around a bonfire. Trisha Etringer led a very interesting discussion about decolonization. Then Manape spoke about sovereignty, and especially sovereignty of yourself.</p>`},
  {label:'★', cat:'celebration', date:'Day 8 &middot; Sep 8', miles:'12.4 mi', place:'City Square Park, Fort Dodge', sub:'Celebration of March', lat:42.5006, lng:-94.1680,
   body:`<p>We had a police escort through downtown Fort Dodge. At the City Square Park the tipi had been set up.</p><p>Before we started walking, we had a nice ceremony where we gave the money we had collected to Alton and Foxy as a gift for their upcoming wedding.</p><p>Drummers played and sang the &ldquo;Mni Wiconi Song.&rdquo; The band Brutal Republic performed. All of their equipment was being powered by the solar system that had accompanied us all week.</p>`},
];

const map = L.map('map',{scrollWheelZoom:true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; OpenStreetMap contributors &copy; CARTO', subdomains:'abcd', maxZoom:19
}).addTo(map);

// route lines
const walk = stops.slice(2).map(s=>[s.lat,s.lng]);        // Birdland -> Fort Dodge
const pre  = [[stops[0].lat,stops[0].lng],[stops[1].lat,stops[1].lng],[stops[2].lat,stops[2].lng]];
L.polyline(pre,{color:'#9FB0BD',weight:2.5,dashArray:'2,8',opacity:.8}).addTo(map);
L.polyline(walk,{color:'#4E7261',weight:4,opacity:.85}).addTo(map);

// markers
const markers = [];
stops.forEach((s,i)=>{
  const big = (s.cat==='camp'||s.cat==='celebration');
  const d = big?34:28;
  const icon = L.divIcon({className:'', html:`<div class="mk" data-i="${i}" style="width:${d}px;height:${d}px;background:${C[s.cat]};font-size:${big?'.95rem':'.8rem'}">${s.label}</div>`, iconSize:[d,d], iconAnchor:[d/2,d/2]});
  const m = L.marker([s.lat,s.lng],{icon}).addTo(map);
  m.on('click',()=>select(i));
  m.bindTooltip(s.place,{direction:'top',offset:[0,-d/2],opacity:.95});
  markers.push(m);
});
map.fitBounds(L.latLngBounds(stops.map(s=>[s.lat,s.lng])).pad(0.12));

// panel
const panel = document.getElementById('panel');
let current = -1;
function overview(){
  current=-1;
  markers.forEach(m=>m._icon&&m._icon.querySelector('.mk').classList.remove('sel'));
  panel.innerHTML = `
    <div class="p-kicker">The Route</div>
    <div class="p-title">Eleven stops along the way</div>
    <p class="p-intro">About thirty Native and non-native people walked ninety-four miles in eight days, sharing stories so a channel could begin to open between them. Select a point on the map &mdash; or a stop below &mdash; to read what happened there.</p>
    <div class="stoplist">${stops.map((s,i)=>`
      <button class="chip" onclick="select(${i})">
        <span class="cdot" style="background:${C[s.cat]}">${s.label}</span>
        <span class="ctxt"><span class="cname">${s.place}</span><span class="csub">${s.date}${s.miles?' &middot; '+s.miles:''}</span></span>
      </button>`).join('')}</div>`;
}
function select(i){
  current=i;
  const s=stops[i];
  markers.forEach((m,j)=>{ if(m._icon){const el=m._icon.querySelector('.mk'); el&&el.classList.toggle('sel', j===i);} });
  map.flyTo([s.lat,s.lng], i<3?13:12, {duration:.7});
  panel.scrollTop=0;
  panel.innerHTML = `
    <button class="back" onclick="overview()">&larr; All stops</button><br>
    <span class="badge" style="background:${C[s.cat]}">${CATLABEL[s.cat]}</span>
    <div class="d-title">${s.place}</div>
    <div class="d-facts"><span><b>${s.date}</b></span>${s.miles?`<span>${s.miles}</span>`:''}</div>
    <div class="d-body">${s.body}</div>
    <div class="d-nav">
      <button class="btn" onclick="select(${i-1})" ${i===0?'disabled':''}>&larr; Previous</button>
      <button class="btn" onclick="select(${i+1})" ${i===stops.length-1?'disabled':''}>Next &rarr;</button>
    </div>`;
}
overview();
setTimeout(()=>map.invalidateSize(),300);
window.addEventListener('resize',()=>map.invalidateSize());
</script>
</body>
</html>
